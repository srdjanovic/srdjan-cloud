name = "srdjan-cloud"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# Create KV namespace with: wrangler kv namespace create BLOG_KV
# Then replace the id values below
[[kv_namespaces]]
binding = "BLOG_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_PREVIEW_NAMESPACE_ID"

# Set admin password with: wrangler secret put ADMIN_PASSWORD
